name: Run tests

on:
  push:
  pull_request:

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: pytest --alluredir=allure-results

      - uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
